name: Build & Deploy

on:
  push:
    branches: [master]

env:
  APP_NAME: virtue-rebirth
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  SPACE_REPO: shdkej/space

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          build-args: |
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SPACE_REPO }}
          token: ${{ secrets.SPACE_DEPLOY_TOKEN }}
          path: space

      - name: Update image tag
        env:
          APP_NAME: ${{ env.APP_NAME }}
          SHA: ${{ github.sha }}
        run: |
          cd space
          sed -i "s|tag: .*|tag: ${SHA}|" "argocd/apps/${APP_NAME}.yaml"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "argocd/apps/${APP_NAME}.yaml"
          git commit -m "deploy: ${APP_NAME} ${SHA}"
          git push
