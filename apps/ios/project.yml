name: VirtueRebirth
options:
  bundleIdPrefix: com.shdkej
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

targets:
  VirtueRebirth:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    dependencies:
      - package: PostHog
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: 환생 오브
        UILaunchScreen: {}
        NSCameraUsageDescription: 선행 인증 사진을 찍기 위해 카메라를 사용합니다.
        NSPhotoLibraryUsageDescription: 선행 인증 사진을 선택하기 위해 사진 라이브러리에 접근합니다.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Resources/VirtueRebirth.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.shdkej.virtuerebirth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shdkej.virtuerebirth
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        SCORE_API_URL: $(SCORE_API_URL)
        POSTHOG_KEY: $(POSTHOG_KEY)
